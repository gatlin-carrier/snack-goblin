services:
  meal-planner:
    build: .
    container_name: meal-planner
    restart: unless-stopped
    ports:
      - "172.17.0.1:3710:3710"
    volumes:
      - /DATA/AppData/meal-planner:/data
    environment:
      - NODE_ENV=production
      - DB_PATH=/data/meal-planner.db
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - INSTACART_API_KEY=${INSTACART_API_KEY:-}
    dns:
      - 8.8.8.8
      - 1.1.1.1
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
