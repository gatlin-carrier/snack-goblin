services:
  meal-planner:
    build:
      context: .
      args:
        # Baked into the frontend bundle at build time (see Dockerfile).
        - VITE_SUPABASE_URL=${SUPABASE_URL:-}
        - VITE_SUPABASE_PUBLISHABLE_KEY=${SUPABASE_PUBLISHABLE_KEY:-}
    container_name: meal-planner
    restart: unless-stopped
    ports:
      - "172.17.0.1:3710:3710"
    volumes:
      - /DATA/AppData/meal-planner:/data
    environment:
      - NODE_ENV=production
      - DB_PATH=/data/meal-planner.db
      # CORS allow-list origin for the SPA (falls back to the lumi-server domain in code).
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN:-https://meal-planner.lumi-server.dev}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # Optional alternative LLM providers (used if no DB-stored config exists).
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - INSTACART_API_KEY=${INSTACART_API_KEY:-}
      - KROGER_CLIENT_ID=${KROGER_CLIENT_ID:-}
      - KROGER_CLIENT_SECRET=${KROGER_CLIENT_SECRET:-}
      - PEXELS_API_KEY=${PEXELS_API_KEY:-}
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_PUBLISHABLE_KEY=${SUPABASE_PUBLISHABLE_KEY:-}
      - ALLOWED_EMAILS=${ALLOWED_EMAILS:-}
      - PASSKEY_RP_ID=${PASSKEY_RP_ID:-meal-planner.lumi-server.dev}
      - PASSKEY_ORIGIN=${PASSKEY_ORIGIN:-https://meal-planner.lumi-server.dev}
      # Shared bearer token for the Goblin Calendar read API (/api/external/v1/*)
      - INTEGRATION_TOKEN=${INTEGRATION_TOKEN:-}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3710/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    dns:
      - 8.8.8.8
      - 1.1.1.1
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
